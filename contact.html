<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – EmailPreview</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
</head>
<body>
  <div id="header-root"></div>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-label">Connect</div>
        <h1 class="section-title">Get in Touch</h1>
        <p class="section-subtitle">Have questions, feedback, or need a custom SEO/Web solution? I'd love to hear from you.</p>

        <div class="contact-card" style="background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 40px; max-width: 600px; margin-top: 40px;">
          <div class="contact-item" style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
            <div style="width: 50px; height: 50px; background: var(--accent-soft); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">📧</div>
            <div>
              <div style="font-size: 0.8rem; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em;">Email Me</div>
              <a href="mailto:nolushac@gmail.com" style="font-size: 1.1rem; font-weight: 600; color: var(--ink);">nolushac@gmail.com</a>
            </div>
          </div>

          <div class="contact-item" style="display: flex; align-items: center; gap: 20px;">
            <div style="width: 50px; height: 50px; background: var(--accent-soft); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">👨‍💻</div>
            <div>
              <div style="font-size: 0.8rem; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em;">Professional Profile</div>
              <div style="font-size: 1.1rem; font-weight: 600; color: var(--ink);">Waqas Bukhari — Web Developer & SEO Expert</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
</body>
</html>
